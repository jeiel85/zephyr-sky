name: zephyr_sky
description: "Minimalist Weather App with beautiful gradients."
publish_to: 'none'

version: 1.3.4+17

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0
  geolocator: ^10.1.0
  flutter_riverpod: ^2.3.6
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  flutter_local_notifications: ^17.1.2
  intl: ^0.20.2
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  home_widget: ^0.6.0
  geocoding: ^3.0.0
  connectivity_plus: ^5.0.2
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.13.1
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#2193b0"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  generate: true
  uses-material-design: true
