name: Flutter CI

on:
  push:
    branches:   
      - main    
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test and Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  app-launch-smoke:
    name: Android Emulator App Launch Smoke Test
    runs-on: ubuntu-latest
    needs: test-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/

      - name: Launch app on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          script: |
            # 에뮬레이터 부팅 대기 강화
            adb wait-for-device
            # 스트리밍 방식이 아닌 기존 방식으로 설치 시도 (Broken pipe 방지)
            adb install --no-streaming -r build/app/outputs/flutter-apk/app-debug.apk
            # 앱 실행 및 프로세스 확인
            adb shell am start -W -n com.jeiel.zephyr_sky.debug/com.jeiel.zephyr_sky.MainActivity
            adb shell pidof com.jeiel.zephyr_sky.debug
